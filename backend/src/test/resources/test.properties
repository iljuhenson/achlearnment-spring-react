
genai.groq.apikey=${GROQ_API_KEY}

genai.settings.speech-to-text.model=whisper-large-v3-turbo
genai.settings.structured-outputs.model=moonshotai/kimi-k2-instruct-0905
genai.settings.structured-outputs.prompt=You are an english teacher who is listening to a student talking about a certain topic, \
  which will be given at the end of this prompt.\n\
  Create short mistakes overview no longer than 100 words, \
  give student advice what to do to fix those mistakes \
  and check if the user was talking on topic, \
  don't be very strict about the topic checking. \n\
  Output JSON only using the schema provided.

